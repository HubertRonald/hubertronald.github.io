name: Validate and Deploy Site

on:
  pull_request:
    branches:
      - master
    paths:
      - "docs/**"
      - "static-sites/**"
      - "static-apps/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/deploy.yml"

  push:
    branches:
      - master
    paths:
      - "docs/**"
      - "static-sites/**"
      - "static-apps/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GitHub Pages after validation"
        required: true
        default: false
        type: boolean

concurrency:
  group: github-pages-site
  cancel-in-progress: false

jobs:
  validate:
    name: Validate site build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress site
        run: npm run docs:build

      - name: Copy standalone static sites and apps
        run: node scripts/copy-static-sites.mjs

      - name: Validate generated output
        run: |
          test -f docs/.vitepress/dist/index.html
          test -d docs/.vitepress/dist/liasoft
          test -f docs/.vitepress/dist/liasoft/index.html

          if [ -d static-apps/liasoft/games/SuperWariBrosWebPlayer ]; then
            test -d docs/.vitepress/dist/liasoft/games/SuperWariBrosWebPlayer
          fi

      - name: Configure GitHub Pages
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4